# HeroBench floor-test ramp -- tier 'chicken_level2' (EASY - doable from the starting kit).
# Part of the calibrated planning ramp for the #7/#8 floor test. Fixed 100-turn
# budget with NO goal_item: run the full budget to see how far the model climbs;
# correctness is scored afterward by
#   pumpkinspice replay-metrics captures/floor_planning_chicken_level2.jsonl \
#       --model <hf-id> --herobench-tier chicken_level2 -o metrics_chicken_level2.jsonl
# Task string is the source-of-truth copy of bench_herobench.RAMP['chicken_level2'].task
# (a test asserts they stay in sync). Run across models with `sweep`; strongest
# retrieval (pgvector+relational) so the type-matching is a planning signal.

[run]
decoder   = "lmstudio"
retrieval = "pgvector"
world     = "herobench"
prompt    = "replan"
capture   = "jsonl"
task      = 'Reach character level 2 by fighting chickens. A chicken is a safe level-1 fight; each win grants 50 XP, and 150 XP reaches level 2.'
max_turns = 100

[decoder]
base_url = "http://localhost:1234"
# model overridden per run by `sweep`; use the SAME model you will replay.

[retrieval]
top_k       = 6
dsn_env     = "PUMPKINSPICE_PG_DSN"
table       = "kg.belief_nodes"
relational  = true
embed_url   = "http://localhost:11434"
embed_model = "nomic-embed-text"

[world]
base_url  = "http://127.0.0.1:8000"
character = "character_1"

[capture]
path = "captures/floor_planning_chicken_level2.jsonl"
